name: Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/*.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: dist/*.zip

  release:
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir release
          cp linux-artifacts/*.AppImage release/ 2>/dev/null || true
          cp linux-deb/*.deb release/ 2>/dev/null || true
          cp windows-artifacts/*.exe release/ 2>/dev/null || true
          cp macos-artifacts/*.dmg release/ 2>/dev/null || true
          cp macos-zip/*.zip release/ 2>/dev/null || true
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
